<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f23;
color:#fff;
min-height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#14142b;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
cursor:pointer;
color:#8b5cf6;
}

/* CATEGORIES */
.cats{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:15px;
}

.cats button{
padding:10px 15px;
border:none;
border-radius:20px;
cursor:pointer;
background:#222;
color:#fff;
}

.cats button.active{
background:#8b5cf6;
}

/* PRODUCTS GRID 4 */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

@media(max-width:900px){
.products{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
.products{grid-template-columns:repeat(1,1fr);}
}

/* CARD */
.card{
background:#1c1c3a;
border-radius:15px;
overflow:hidden;
text-align:center;
}

.card img,.card video{
width:100%;
height:160px;
object-fit:cover;
}

.card h4{padding:10px}
.price{color:#8b5cf6;font-weight:bold}

/* ADMIN BUTTON */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
padding:12px;
border-radius:10px;
cursor:pointer;
}

/* PANEL */
.panel{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.panel-box{
background:#1c1c3a;
padding:20px;
border-radius:15px;
width:90%;
max-width:500px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#8b5cf6;
color:#fff;
border:none;
cursor:pointer;
}

/* LIST ADMIN */
.list{
margin-top:10px;
max-height:200px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#2a2a55;
padding:5px;
margin:5px 0;
border-radius:8px;
}

.item button{
width:auto;
padding:5px 10px;
background:red;
}
</style>
</head>

<body>

<header>
<div class="logo" id="logo">Luxury Store</div>
</header>

<!-- CATEGORIES -->
<div class="cats">
<button class="active" onclick="filter('all')">الكل</button>
<button onclick="filter('shoes')">أحذية</button>
<button onclick="filter('clothes')">ملابس</button>
<button onclick="filter('perfume')">عطور</button>
<button onclick="filter('acc')">إكسسوارات</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- ADMIN BUTTON -->
<div class="admin-btn" onclick="openAdmin()">Admin</div>

<!-- PANEL -->
<div class="panel" id="panel">
<div class="panel-box">

<h3>لوحة التحكم</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<select id="cat">
<option value="shoes">أحذية</option>
<option value="clothes">ملابس</option>
<option value="perfume">عطور</option>
<option value="acc">إكسسوارات</option>
</select>

<input type="file" id="file" multiple accept="image/*,video/*">

<button onclick="add()">➕ إضافة منتج</button>
<button onclick="closeAdmin()">❌ إغلاق</button>

<h3>حذف المنتجات</h3>
<div class="list" id="list"></div>

</div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/393510798667" class="admin-btn" style="right:20px;left:auto;background:#25D366">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];
let clicks = 0;
let current = "all";

/* SECRET ADMIN 10 CLICKS */
document.getElementById("logo").onclick = () => {
clicks++;
setTimeout(()=>clicks=0,3000);

if(clicks>=10){
openAdmin();
clicks=0;
}
}

/* FILTER */
function filter(c){
current = c;
render();
}

/* RENDER */
function render(){
let box = document.getElementById("products");
box.innerHTML="";

products
.filter(p => current==="all" || p.cat===current)
.forEach((p,i)=>{

let media = p.media[0];
let tag = media.includes("video")
? `<video src="${media}" autoplay muted loop></video>`
: `<img src="${media}">`;

box.innerHTML += `
<div class="card">
${tag}
<h4>${p.name}</h4>
<p class="price">${p.price} €</p>
</div>`;
});

renderList();
}

/* ADD PRODUCT */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("file").files;

if(!name||!price||files.length==0){
alert("املأ جميع الحقول");
return;
}

let media=[];
let done=0;

for(let i=0;i<files.length;i++){
let r=new FileReader();

r.onload=e=>{
media.push(e.target.result);
done++;

if(done==files.length){
products.push({name,price,cat,media});
localStorage.setItem("p",JSON.stringify(products));
render();
}
};

r.readAsDataURL(files[i]);
}
}

/* ADMIN LIST */
function renderList(){
let list=document.getElementById("list");
list.innerHTML="";

products.forEach((p,i)=>{
list.innerHTML+=`
<div class="item">
<span>${p.name}</span>
<button onclick="del(${i})">حذف</button>
</div>`;
});
}

/* DELETE FROM PANEL */
function del(i){
products.splice(i,1);
localStorage.setItem("p",JSON.stringify(products));
render();
}

/* ADMIN LOGIN */
function openAdmin(){
let pass=prompt("🔐 Password:");

if(pass==="200911"){
document.getElementById("panel").style.display="flex";
renderList();
}else{
alert("❌ خطأ في كلمة السر");
}
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

render();

</script>

</body>
</html>
