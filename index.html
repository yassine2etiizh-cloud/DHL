<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxora Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#0f0f23;
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#14142b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
cursor:pointer;
}

/* FILTERS */
.filters{
display:flex;
gap:10px;
justify-content:center;
padding:10px;
flex-wrap:wrap;
}

.filters button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1c1c3a;
color:#fff;
}

.filters button.active{
background:#8b5cf6;
}

/* PRODUCTS GRID 4 per row */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

@media(max-width:1000px){
.products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
.products{grid-template-columns:1fr;}
}

.card{
background:#1c1c3a;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:scale(1.04)}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.info{padding:10px}

.price{color:#8b5cf6;font-weight:bold}

/* BUTTON */
.btn{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.buy{background:#25D366;color:#fff}

/* ADMIN BUTTON */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
padding:12px;
border-radius:10px;
cursor:pointer;
}

/* ADMIN PANEL */
.panel{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.panel-box{
background:#1c1c3a;
padding:20px;
border-radius:15px;
width:320px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px;
width:100%;
margin-top:10px;
background:#8b5cf6;
color:#fff;
border:none;
cursor:pointer;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div class="logo">Luxora Shop</div>
</header>

<!-- FILTERS -->
<div class="filters">
<button class="active" onclick="setFilter('all',this)">الكل</button>
<button onclick="setFilter('clothes',this)">ملابس</button>
<button onclick="setFilter('shoes',this)">أحذية</button>
<button onclick="setFilter('accessories',this)">إكسسوارات</button>
</div>

<div class="products" id="products"></div>

<!-- ADMIN -->
<div class="admin-btn" onclick="openAdmin()">⚙ Admin</div>

<div class="panel" id="panel">
<div class="panel-box">

<h3>Admin Panel</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن €">

<select id="cat">
<option value="clothes">ملابس</option>
<option value="shoes">أحذية</option>
<option value="accessories">إكسسوارات</option>
</select>

<input type="file" id="file">

<button onclick="add()">إضافة المنتج</button>
<button onclick="closeAdmin()">إغلاق</button>

</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];
let currentFilter = "all";

/* render */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products
.filter(p => currentFilter==="all" || p.cat===currentFilter)
.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.media}">
<div class="info">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>

<button class="btn buy" onclick="buy('${p.name}','${p.price}')">
📱 اطلب عبر واتساب
</button>

</div>
</div>`;
});
}
render();

/* filter */
function setFilter(cat,btn){
currentFilter=cat;

document.querySelectorAll(".filters button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

render();
}

/* add product */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let file=document.getElementById("file").files[0];

let reader=new FileReader();

reader.onload=function(e){

products.push({
name:name,
price:price,
cat:cat,
media:e.target.result
});

localStorage.setItem("p",JSON.stringify(products));
render();
closeAdmin();
}

reader.readAsDataURL(file);
}

/* whatsapp */
function buy(name,price){
let msg=`سلام 👋\nبغيت نشري:\n📦 ${name}\n💰 ${price} €`;

let url=`https://wa.me/qr/WHVT75K5O3M2D1?text=${encodeURIComponent(msg)}`;

window.open(url,"_blank");
}

/* admin */
function openAdmin(){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("panel").style.display="flex";
}else{
alert("Wrong password");
}
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
