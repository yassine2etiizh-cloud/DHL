<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#070714,#0b0b1a,#11112a);
color:#fff;
}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:15px;
}

.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

h4,p{
margin:5px;
}
</style>
</head>

<body>

<div class="products" id="products"></div>

<script>

/* ✅ PRODUCTS */
let products = [
{
id: 1,
name: "Nike Shoes",
price: "120€",
cat: "shoes",
media: [
"https://res.cloudinary.com/doqmnggtl/image/upload/f_auto,q_auto/IMG_1782_rz5sa5"
]
},
{
id: 2,
name: "T-Shirt",
price: "50€",
cat: "clothes",
media: [
"https://res.cloudinary.com/doqmnggtl/image/upload/f_auto,q_auto/IMG_1782_rz5sa5"
]
}
];

/* ✅ RENDER SAFE */
function render(){
let box = document.getElementById("products");
box.innerHTML = "";

products.forEach(p=>{

let img = (p.media && p.media.length > 0)
? p.media[0]
: "https://via.placeholder.com/300";

box.innerHTML += `
<div class="card">
<img src="${img}" onerror="this.src='https://via.placeholder.com/300'">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;

});
}

render();

</script>

</body>
</html>
