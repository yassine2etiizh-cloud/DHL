<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Store IT</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f0f23,#1c1c3a);
color:#fff;
}

header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

.cats{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.cats button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#2a2a50;
color:#fff;
cursor:pointer;
}

.cats button.active{
background:#8b5cf6;
}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:15px;
}

.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:280px;
text-align:center;
}

#mediaBox img{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<header>Aldo Store</header>

<div class="cats">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('shoes',this)">Shoes</button>
<button onclick="filter('clothes',this)">Clothes</button>
<button onclick="filter('acc',this)">Acc</button>
<button onclick="filter('perfume',this)">Perfume</button>
</div>

<div class="products" id="products"></div>

<div class="popup" id="popup">
<div class="box">
<h3 id="name"></h3>
<p id="price"></p>

<div id="mediaBox"></div>

<div style="display:flex;justify-content:space-between;margin-top:10px;">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
</div>

<button onclick="closeP()">Close</button>

</div>
</div>

<!-- products file -->
<script src="products.js"></script>

<script>

let current="all";
let currentProduct=null;
let index=0;

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

let filtered = products.filter(p=>current==="all"||p.cat===current);

filtered.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openP(${p.id})">
<img src="${p.media[0]}">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;
});
}

/* FILTER */
function filter(c,btn){
current=c;
document.querySelectorAll(".cats button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

/* OPEN */
function openP(id){
currentProduct=products.find(x=>x.id==id);
index=0;

document.getElementById("popup").style.display="flex";
document.getElementById("name").innerText=currentProduct.name;
document.getElementById("price").innerText=currentProduct.price;

show();
}

function show(){
document.getElementById("mediaBox").innerHTML=
`<img src="${currentProduct.media[index]}">`;
}

function next(){
index=(index+1)%currentProduct.media.length;
show();
}

function prev(){
index=(index-1+currentProduct.media.length)%currentProduct.media.length;
show();
}

function closeP(){
document.getElementById("popup").style.display="none";
}

render();

</script>

</body>
</html>
