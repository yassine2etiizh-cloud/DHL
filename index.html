<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Store IT</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f0f23,#1c1c3a);
color:#fff;
}

header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

.cats{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.cats button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#2a2a50;
color:#fff;
cursor:pointer;
}

.cats button.active{
background:#8b5cf6;
}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:15px;
}

.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:280px;
text-align:center;
}

#mediaBox img{
width:100%;
border-radius:10px;
}

button{
cursor:pointer;
}

.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
border:none;
padding:10px;
border-radius:10px;
color:#fff;
}
</style>
</head>

<body>

<header>Aldo Store</header>

<div class="cats">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('shoes',this)">Shoes</button>
<button onclick="filter('clothes',this)">Clothes</button>
<button onclick="filter('acc',this)">Acc</button>
<button onclick="filter('perfume',this)">Perfume</button>
</div>

<div class="products" id="products"></div>

<div class="popup" id="popup">
<div class="box">
<h3 id="name"></h3>
<p id="price"></p>

<div id="mediaBox"></div>

<div style="display:flex;justify-content:space-between;margin-top:10px;">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
</div>

<button onclick="closeP()">Close</button>
</div>
</div>

<button class="admin-btn" onclick="openAdmin()">Admin</button>

<div id="adminPanel" style="display:none;position:fixed;inset:0;background:#000c;justify-content:center;align-items:center;">
<div style="background:#1c1c3a;padding:20px;border-radius:10px;width:300px;color:#fff">

<h3>Add Product</h3>

<input id="pname" placeholder="Name"><br><br>
<input id="pprice" placeholder="Price"><br><br>
<input id="pimg" placeholder="Image URL"><br><br>

<select id="pcat">
<option value="shoes">Shoes</option>
<option value="clothes">Clothes</option>
<option value="acc">Acc</option>
<option value="perfume">Perfume</option>
</select>

<br><br>
<button onclick="add()">Add</button>
<button onclick="closeAdmin()">Close</button>

</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];

let current="all";
let currentProduct=null;
let index=0;

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

if(products.length===0){
box.innerHTML="<p style='text-align:center'>No products</p>";
return;
}

products.filter(p=>current==="all"||p.cat===current)
.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openP(${p.id})">
<img src="${p.media[0]}">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;
});
}

/* FILTER */
function filter(c,btn){
current=c;
document.querySelectorAll(".cats button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

/* OPEN */
function openP(id){
let p=products.find(x=>x.id==id);
currentProduct=p;
index=0;

document.getElementById("popup").style.display="flex";
document.getElementById("name").innerText=p.name;
document.getElementById("price").innerText=p.price;

show();
}

function show(){
let box=document.getElementById("mediaBox");
box.innerHTML=`<img src="${currentProduct.media[index]}">`;
}

function next(){
index=(index+1)%currentProduct.media.length;
show();
}

function prev(){
index=(index-1+currentProduct.media.length)%currentProduct.media.length;
show();
}

function closeP(){
document.getElementById("popup").style.display="none";
}

/* ADMIN */
function openAdmin(){
document.getElementById("adminPanel").style.display="flex";
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

/* ADD PRODUCT */
function add(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let img=document.getElementById("pimg").value;
let cat=document.getElementById("pcat").value;

if(!img){
img="https://via.placeholder.com/300";
}

products.push({
id:Date.now(),
name,
price,
cat,
media:[img]
});

localStorage.setItem("p",JSON.stringify(products));
render();
closeAdmin();
}

render();

</script>

</body>
</html>
