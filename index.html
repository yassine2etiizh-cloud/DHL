<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Store IT</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f0f23,#1c1c3a);
color:#fff;
}

/* HEADER */
header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

/* CATEGORIES */
.cats{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.cats button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#2a2a50;
color:#fff;
cursor:pointer;
}

.cats button.active{
background:#8b5cf6;
}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:1fr;
gap:10px;
padding:15px;
}

/* ✅ NEW CARD STYLE (BOX 4:1) */
.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
padding:10px;
transition:0.3s;
height:90px;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.card h4{
font-size:13px;
margin:0;
flex:1;
text-align:left;
}

.card p{
font-size:12px;
margin:0;
color:#8b5cf6;
font-weight:bold;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:280px;
text-align:center;
}

#mediaBox img{
width:100%;
border-radius:10px;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<header>Aldo Store</header>

<!-- CATEGORIES -->
<div class="cats">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('shoes',this)">Shoes</button>
<button onclick="filter('clothes',this)">Clothes</button>
<button onclick="filter('acc',this)">Acc</button>
<button onclick="filter('perfume',this)">Perfume</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">
<h3 id="name"></h3>
<p id="price"></p>

<div id="mediaBox"></div>

<div style="display:flex;justify-content:space-between;margin-top:10px;">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
</div>

<button onclick="closeP()">Close</button>

</div>
</div>

<!-- DATA FILE -->
<script src="products.js"></script>

<script>

let current="all";
let currentProduct=null;
let index=0;

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

let filtered = products.filter(p=>current==="all"||p.cat===current);

if(filtered.length===0){
box.innerHTML="<p style='text-align:center'>No products</p>";
return;
}

filtered.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openP(${p.id})">
<img src="${p.media[0]}">
<div style="flex:1">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
</div>
`;
});
}

/* FILTER */
function filter(c,btn){
current=c;
document.querySelectorAll(".cats button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

/* OPEN PRODUCT */
function openP(id){
currentProduct = products.find(x=>x.id==id);
index = 0;

document.getElementById("popup").style.display="flex";
document.getElementById("name").innerText=currentProduct.name;
document.getElementById("price").innerText=currentProduct.price;

show();
}

/* SHOW MEDIA */
function show(){
document.getElementById("mediaBox").innerHTML=
`<img src="${currentProduct.media[index]}">`;
}

/* NEXT */
function next(){
index = (index+1) % currentProduct.media.length;
show();
}

/* PREV */
function prev(){
index = (index-1+currentProduct.media.length) % currentProduct.media.length;
show();
}

/* CLOSE */
function closeP(){
document.getElementById("popup").style.display="none";
}

render();

</script>

</body>
</html>
