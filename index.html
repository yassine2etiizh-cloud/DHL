<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Store IT</title>

<style>
html, body{
margin:0;
padding:0;
min-height:100%;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0f0f23,#1c1c3a);
color:#fff;
}

header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

.cats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:15px;
}

.cats button{
padding:8px 14px;
border-radius:25px;
border:none;
cursor:pointer;
background:#2a2a50;
color:#fff;
font-size:12px;
}

.cats button.active{
background:#8b5cf6;
}

.products{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:10px;
padding:15px;
}

.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.3s;
aspect-ratio:1/1.4;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
height:70%;
object-fit:cover;
}

.card h4{font-size:12px;margin:2px 0;}
.card p{font-size:12px;margin:0;color:#8b5cf6;font-weight:bold;}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:260px;
text-align:center;
}

#mediaBox img,
#mediaBox video{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.wa-btn{
display:block;
background:#25D366;
color:#fff;
padding:10px;
border-radius:8px;
text-decoration:none;
margin-top:10px;
font-weight:bold;
}

.float-wa{
position:fixed;
bottom:80px;
left:20px;
background:#25D366;
padding:12px 14px;
border-radius:50px;
color:#fff;
text-decoration:none;
}

.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
border:none;
padding:10px;
border-radius:10px;
color:#fff;
cursor:pointer;
}

.admin{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.admin-box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:320px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:6px;
}

.admin-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#2a2a50;
padding:8px;
border-radius:8px;
margin:5px 0;
font-size:12px;
}

.admin-item img{
width:40px;height:40px;
object-fit:cover;
border-radius:6px;
}

.admin-item button{
background:red;
border:none;
color:#fff;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<header>Aldo_footlocker</header>

<div class="cats">
<button class="active" onclick="filter('all',this)">Tutto</button>
<button onclick="filter('clothes',this)">👕 vestiti</button>
<button onclick="filter('shoes',this)">👟 Scarpe</button>
<button onclick="filter('acc',this)">💍 Accessori</button>
<button onclick="filter('perfume',this)">🌹 Profumi</button>
</div>

<div class="products" id="products"></div>

<div class="popup" id="popup">
<div class="box">

<h3 id="pname"></h3>
<p id="pprice"></p>

<div id="mediaBox"></div>

<div style="display:flex;justify-content:space-between;">
<button onclick="prevMedia()">⬅️</button>
<button onclick="nextMedia()">➡️</button>
</div>

<a id="waLink" class="wa-btn" target="_blank">📲 Order</a>
<button onclick="closeP()">Chiudi</button>

</div>
</div>

<a class="float-wa" href="https://wa.me/393510798667" target="_blank">💬 WhatsApp</a>

<button class="admin-btn" onclick="openAdmin()">Admin</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL (important)">

<select id="cat">
<option value="shoes">Shoes</option>
<option value="clothes">Clothes</option>
<option value="acc">Acc</option>
<option value="perfume">Perfume</option>
</select>

<button onclick="add()">Add</button>

<hr>
<h3>Delete Products</h3>
<div id="adminList"></div>

<button onclick="closeAdmin()">Close</button>

</div>
</div>

<script>

/* EMPTY STORE */
let products = JSON.parse(localStorage.getItem("p")) || [];

let current="all";
let currentProduct=null;
let mediaIndex=0;

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

if(products.length===0){
box.innerHTML="<p style='text-align:center;width:100%;padding:40px;color:#aaa'>No products yet</p>";
return;
}

products
.filter(p=>current==="all"||p.cat===current)
.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openP(${p.id})">
<img src="${p.media[0]}">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;
});
}

/* FILTER */
function filter(c,btn){
current=c;
document.querySelectorAll(".cats button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

/* OPEN */
function openP(id){
let p=products.find(x=>x.id==id);
if(!p) return;

currentProduct=p;
mediaIndex=0;

document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=p.name;
document.getElementById("pprice").innerText=p.price;

showMedia();

document.getElementById("waLink").href=
`https://wa.me/393510798667?text=${encodeURIComponent(p.name+" - "+p.price)}`;
}

/* MEDIA */
function showMedia(){
let box=document.getElementById("mediaBox");

let item=currentProduct.media[mediaIndex];

if(item.includes("video")){
box.innerHTML=`<video controls autoplay style="width:100%;border-radius:10px">
<source src="${item}">
</video>`;
}else{
box.innerHTML=`<img src="${item}" style="width:100%;border-radius:10px">`;
}
}

/* NEXT / PREV */
function nextMedia(){
mediaIndex=(mediaIndex+1)%currentProduct.media.length;
showMedia();
}

function prevMedia(){
mediaIndex=(mediaIndex-1+currentProduct.media.length)%currentProduct.media.length;
showMedia();
}

function closeP(){
document.getElementById("popup").style.display="none";
}

/* ADMIN */
function openAdmin(){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("admin").style.display="flex";
renderAdmin();
}
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

/* ADD (IMPORTANT FIX) */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let img=document.getElementById("img").value;
let cat=document.getElementById("cat").value;

if(!img){
img="https://via.placeholder.com/300";
}

products.push({
id:Date.now()+Math.random(),
name,
price,
cat,
media:[img]
});

save();
}

/* SAVE */
function save(){
localStorage.setItem("p",JSON.stringify(products));
render();
renderAdmin();
closeAdmin();
}

/* ADMIN LIST */
function renderAdmin(){
let box=document.getElementById("adminList");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="admin-item">
<div style="display:flex;gap:10px;align-items:center;">
<img src="${p.media[0]}">
<span>${p.name}</span>
</div>
<button onclick="del(${p.id})">❌</button>
</div>
`;
});
}

/* DELETE */
function del(id){
products=products.filter(p=>p.id!=id);
save();
}

render();

</script>

</body>
</html>
