<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f23;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#14142b;
position:sticky;
top:0;
}

.logo{font-size:22px;font-weight:bold;cursor:pointer}

.search input{
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

/* categories */
.cats{
display:flex;
gap:10px;
justify-content:center;
padding:10px;
flex-wrap:wrap;
}

.cats button{
padding:8px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2a2a50;
color:#fff;
}

.cats button.active{background:#8b5cf6}

/* grid 4 in row */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:.3s;
font-size:14px;
}

.card:hover{transform:scale(1.05)}

.card img, .card video{
width:100%;
height:140px;
object-fit:cover;
}

.price{color:#8b5cf6;font-weight:bold}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:12px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

/* popup */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:300px;
}

/* admin */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.panel{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}

.panel-box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:320px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
}

button{
background:#8b5cf6;
color:#fff;
cursor:pointer;
}

/* delete btn */
.del{
background:red;
margin-top:5px;
}
</style>
</head>

<body>

<header>
<div class="logo" id="logo">Luxury Shop</div>
<div class="search"><input id="search" placeholder="بحث..."></div>
</header>

<!-- categories -->
<div class="cats">
<button onclick="filter('all')" class="active">الكل</button>
<button onclick="filter('shoes')">أحذية</button>
<button onclick="filter('clothes')">ملابس</button>
<button onclick="filter('perfume')">عطور</button>
<button onclick="filter('accessories')">إكسسوارات</button>
</div>

<div class="products" id="products"></div>

<!-- popup -->
<div class="popup" id="popup">
<div class="box">
<h3 id="pname"></h3>
<p id="pprice"></p>
<button onclick="closeP()">Close</button>
</div>
</div>

<!-- admin -->
<div class="admin-btn" onclick="openAdmin()">Admin</div>

<div class="panel" id="panel">
<div class="panel-box">

<h3>Admin Panel</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">

<select id="cat">
<option value="shoes">أحذية</option>
<option value="clothes">ملابس</option>
<option value="perfume">عطور</option>
<option value="accessories">إكسسوارات</option>
</select>

<input type="file" id="file" multiple accept="image/*,video/*">

<button onclick="add()">Add Product</button>
<button onclick="closeAdmin()">Close</button>

</div>
</div>

<!-- whatsapp -->
<a class="whatsapp" href="https://wa.me/393510798667" target="_blank">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];
let current = "all";
let clicks = 0;

/* secret admin 10 clicks */
document.getElementById("logo").onclick = () => {
clicks++;
setTimeout(()=>clicks=0,3000);

if(clicks >= 10){
let pass = prompt("Password:");
if(pass === "200911"){
document.getElementById("panel").style.display="flex";
}
clicks = 0;
}
}

/* render */
function render(){
let box = document.getElementById("products");
box.innerHTML="";

let list = products.filter(p => current==="all" || p.cat===current);

list.forEach((p,i)=>{
let media = p.media[0];

box.innerHTML += `
<div class="card" onclick="openP(${i})">

${media.includes("video") ?
`<video src="${media}" muted></video>` :
`<img src="${media}">`
}

<h4>${p.name}</h4>
<p class="price">${p.price} €</p>

<button class="del" onclick="del(event,${i})">حذف</button>

</div>`;
});
}

render();

/* filter */
function filter(c){
current=c;
render();
}

/* add product */
function add(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let cat = document.getElementById("cat").value;
let files = document.getElementById("file").files;

let media=[];

for(let i=0;i<files.length;i++){
let reader=new FileReader();

reader.onload=e=>{
media.push(e.target.result);

if(media.length===files.length){
products.push({name,price,cat,media});
localStorage.setItem("p",JSON.stringify(products));
render();
}
}

reader.readAsDataURL(files[i]);
}
}

/* delete */
function del(e,i){
e.stopPropagation();
products.splice(i,1);
localStorage.setItem("p",JSON.stringify(products));
render();
}

/* popup */
function openP(i){
document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=products[i].name;
document.getElementById("pprice").innerText=products[i].price+" €";
}

function closeP(){
document.getElementById("popup").style.display="none";
}

/* admin */
function openAdmin(){
document.getElementById("panel").style.display="flex";
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
