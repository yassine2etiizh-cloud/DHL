<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxora Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#0f0f23;
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#14142b;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* FILTERS */
.tabs{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.tab{
padding:10px 15px;
background:#1c1c3a;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.tab.active{
background:#8b5cf6;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

@media(max-width:1000px){
.products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
.products{grid-template-columns:1fr;}
}

.card{
background:#1c1c3a;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card:hover{
transform:scale(1.03);
}

.info{
padding:10px;
}

.price{
color:#8b5cf6;
font-weight:bold;
}

.btn{
display:block;
margin-top:8px;
padding:8px;
background:#25D366;
color:#fff;
text-align:center;
border-radius:8px;
text-decoration:none;
}

/* ADMIN */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.panel{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:15px;
width:320px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
}

button{
background:#8b5cf6;
color:#fff;
cursor:pointer;
}

.list-item{
background:#22224a;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.del{
background:red;
}
</style>
</head>

<body>

<header>Luxora Shop</header>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="filter('all',this)">الكل</div>
<div class="tab" onclick="filter('shoes',this)">أحذية 👟</div>
<div class="tab" onclick="filter('clothes',this)">ملابس 👕</div>
<div class="tab" onclick="filter('accessories',this)">أكسسوارات ⌚</div>
</div>

<div class="products" id="products"></div>

<!-- ADMIN -->
<div class="admin-btn" onclick="openAdmin()">Admin</div>

<div class="panel" id="panel">
<div class="box">

<h3>Admin Panel</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">

<select id="cat">
<option value="shoes">أحذية</option>
<option value="clothes">ملابس</option>
<option value="accessories">أكسسوارات</option>
</select>

<input type="file" id="media" multiple>

<button onclick="addProduct()">إضافة</button>
<button onclick="closeAdmin()">إغلاق</button>

<hr>

<div id="adminList"></div>

</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let currentFilter = "all";

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

let filtered = products.filter(p=>{
return currentFilter==="all" || p.cat===currentFilter;
});

filtered.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.media[0]}">
<div class="info">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>
<a class="btn" href="https://wa.me/qr/WHVT75K5O3M2D1" target="_blank">طلب واتساب</a>
</div>
</div>`;
});

renderAdmin();
}

/* FILTER */
function filter(cat,el){
currentFilter=cat;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");

render();
}

/* ADD */
function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("media").files;

let media=[];

for(let i=0;i<files.length;i++){
let reader=new FileReader();

reader.onload=e=>{
media.push(e.target.result);

if(media.length===files.length){
products.push({name,price,cat,media});
localStorage.setItem("products",JSON.stringify(products));
render();
}
};

reader.readAsDataURL(files[i]);
}
}

/* ADMIN LIST */
function renderAdmin(){
let box=document.getElementById("adminList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="list-item">
${p.name} - ${p.price}€
<button class="del" onclick="del(${i})">حذف</button>
</div>`;
});
}

/* DELETE */
function del(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}

/* ADMIN */
function openAdmin(){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("panel").style.display="flex";
}else alert("Wrong");
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

render();

</script>

</body>
</html>
