<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxora Shop - متجر فاخر</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}

:root{
--primary:#8b5cf6;
--secondary:#ec4899;
--bg:#0f0f23;
--card:#1a1a2e;
--glass:rgba(255,255,255,0.1);
--shadow:0 10px 30px rgba(0,0,0,0.5);
}

body{
background:linear-gradient(135deg,var(--bg),#1e1e3f);
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

header{
position:fixed;
top:0;width:100%;
background:rgba(20,20,43,0.95);
backdrop-filter:blur(20px);
padding:20px 0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav{
max-width:1400px;margin:0 auto;padding:0 20px;
display:flex;justify-content:space-between;align-items:center;
}

.logo{
font-size:28px;font-weight:800;
background:linear-gradient(45deg,var(--primary),var(--secondary));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
cursor:pointer;transition:all 0.3s ease;
position:relative;
}

.logo:hover{transform:scale(1.05)}

.logo-count{
position:absolute;top:-10px;left:-15px;
background:var(--secondary);color:#fff;
border-radius:50%;width:30px;height:30px;
display:none;align-items:center;justify-content:center;
font-size:12px;font-weight:bold;
animation:pulse 1s infinite;
}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.search{
position:relative;flex:1;max-width:500px;margin:0 40px;
}

.search input{
width:100%;padding:15px 20px 15px 50px;
background:var(--glass);border:1px solid rgba(255,255,255,0.2);
border-radius:50px;color:#fff;font-size:16px;
backdrop-filter:blur(10px);transition:all 0.3s ease;
}

.search input::placeholder{color:rgba(255,255,255,0.6)}

.search input:focus{
outline:none;box-shadow:0 0 20px rgba(139,92,246,0.3);
border-color:var(--primary);background:rgba(255,255,255,0.15);
}

.search i{
position:absolute;left:20px;top:50%;transform:translateY(-50%);
color:rgba(255,255,255,0.6);font-size:18px;
}

.products{
max-width:1400px;margin:120px auto 0;padding:0 20px;
display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.card{
background:var(--card);border-radius:25px;overflow:hidden;
cursor:pointer;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);
}

.card:hover{
transform:translateY(-15px) scale(1.02);
box-shadow:var(--shadow);
border-color:var(--primary);
}

.card-img{
height:280px;overflow:hidden;position:relative;
}

.card-img img{
width:100%;height:100%;object-fit:cover;
transition:all 0.4s ease;
}

.card:hover .card-img img{transform:scale(1.1)}

.card-info{padding:25px 20px;text-align:center}

.card-cat{
color:var(--secondary);font-size:14px;font-weight:600;
text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;
}

.card-name{font-size:22px;font-weight:700;margin-bottom:10px;line-height:1.3}

.card-price{
font-size:28px;font-weight:800;color:var(--primary);
margin-bottom:15px;
}

.card-size{color:rgba(255,255,255,0.7);font-size:15px}

/* POPUP */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);backdrop-filter:blur(15px);
display:none;justify-content:center;align-items:center;z-index:2000;
opacity:0;transition:all 0.4s ease;
}

.popup.active{display:flex;opacity:1}

.popup-content{
background:var(--card);border-radius:25px;
width:90%;max-width:1000px;max-height:90vh;
position:relative;transform:scale(0.8);transition:all 0.4s ease;
border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(20px);
}

.popup.active .popup-content{transform:scale(1)}

.popup-close{
position:absolute;top:20px;right:25px;
width:50px;height:50px;border-radius:50%;
background:var(--glass);color:#fff;border:none;
font-size:24px;cursor:pointer;transition:all 0.3s ease;
display:flex;align-items:center;justify-content:center;
}

.popup-close:hover{background:var(--primary);transform:rotate(90deg)}

.popup-gallery{
display:grid;grid-template-columns:1fr 1fr;gap:0;height:500px;
}

.main-img{position:relative;overflow:hidden}
.main-img img{width:100%;height:100%;object-fit:cover}

.thumbs{padding:30px;display:flex;flex-direction:column;gap:15px}

.thumb{
height:100px;border-radius:15px;overflow:hidden;cursor:pointer;
opacity:0.7;transition:all 0.3s ease;border:3px solid transparent;
}

.thumb.active,.thumb:hover{opacity:1;border-color:var(--primary)}

.thumb img{width:100%;height:100%;object-fit:cover}

.popup-details{padding:40px;display:flex;flex-direction:column;gap:20px}

.p-title{font-size:32px;font-weight:800;margin-bottom:10px}
.p-price{font-size:40px;font-weight:800;color:var(--primary)}

/* ADMIN PANEL */
.admin-overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.98);backdrop-filter:blur(25px);
display:none;justify-content:center;align-items:center;z-index:3000;
opacity:0;transition:all 0.4s ease;
}

.admin-overlay.active{display:flex;opacity:1}

.admin-panel{
background:var(--card);border-radius:30px;
padding:40px;max-width:500px;width:95%;max-height:90vh;
overflow-y:auto;transform:scale(0.8);transition:all 0.4s ease;
border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(30px);
}

.admin-overlay.active .admin-panel{transform:scale(1)}

.admin-header{text-align:center;margin-bottom:30px}
.admin-title{
font-size:32px;font-weight:800;
background:linear-gradient(45deg,var(--primary),var(--secondary));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.form-group{margin-bottom:25px}
.form-label{
display:block;margin-bottom:10px;font-weight:600;
color:rgba(255,255,255,0.9);font-size:15px;
}

.form-input,.form-select{
width:100%;padding:18px 20px;
background:var(--glass);border:2px solid rgba(255,255,255,0.2);
border-radius:20px;color:#fff;font-size:16px;
font-family:inherit;transition:all 0.3s ease;
}

.form-input:focus,.form-select:focus{
outline:none;border-color:var(--primary);
box-shadow:0 0 0 4px rgba(139,92,246,0.2);
background:rgba(255,255,255,0.15);
}

.upload-zone{
border:3px dashed rgba(255,255,255,0.3);border-radius:20px;
padding:40px;text-align:center;cursor:pointer;
transition:all 0.3s ease;background:var(--glass);
margin-bottom:25px;
}

.upload-zone:hover,.upload-zone.dragover{
border-color:var(--primary);background:rgba(139,92,246,0.1);
}

.upload-icon{font-size:48px;color:rgba(255,255,255,0.6);
margin-bottom:20px;display:block}

.upload-text{font-weight:600;color:rgba(255,255,255,0.9);
font-size:18px;margin-bottom:5px}

.upload-hint{color:rgba(255,255,255,0.6);font-size:14px}

.files-preview{display:flex;flex-wrap:wrap;gap:15px;margin-top:20px}

.preview-item{
position:relative;width:100px;height:100px;border-radius:15px;
overflow:hidden;background:var(--glass);display:flex;
align-items:center;justify-content:center;
}

.preview-item img,.preview-item video{
width:100%;height:100%;object-fit:cover
}

.preview-remove{
position:absolute;top:5px;right:5px;background:var(--danger);
color:#fff;border:none;border-radius:50%;width:25px;height:25px;
font-size:12px;cursor:pointer;opacity:0;transition:all 0.3s ease;
display:flex;align-items:center;justify-content:center;
}

.preview-item:hover .preview-remove{opacity:1}

.btn{
padding:18px 30px;border:none;border-radius:20px;
font-size:16px;font-weight:700;cursor:pointer;
transition:all 0.3s ease;display:flex;align-items:center;
justify-content:center;gap:10px;font-family:inherit;
width:100%;margin-top:10px;
}

.btn-primary{
background:linear-gradient(45deg,var(--primary),var(--secondary));
color:#fff;
}

.btn-primary:hover{transform:translateY(-3px);box-shadow:var(--shadow)}

.btn-success{
background:linear-gradient(45deg,#10b981,#059669);color:#fff;
}

.btn-danger{
background:linear-gradient(45deg,var(--danger),#dc2626);color:#fff;
}

.admin-products{margin-top:40px}
.admin-product{
background:var(--glass);border-radius:20px;padding:20px;
margin-bottom:20px;display:flex;align-items:center;gap:20px;
border:1px solid rgba(255,255,255,0.1)
}

.admin-product-img{
width:80px;height:80px;border-radius:15px;overflow:hidden;
flex-shrink:0;
}

.admin-product-img img{width:100%;height:100%;object-fit:cover}

.product-info{flex:1}
.product-name{font-weight:700;font-size:18px;margin-bottom:5px}
.product-price{font-size:20px;color:var(--primary);font-weight:800}

/* Responsive */
@media(max-width:768px){
.products{gap:20px;padding:0 15px}
.popup-gallery{grid-template-columns:1fr;height:400px}
.popup-details{padding:25px}
.admin-panel{padding:25px;margin:20px}
}
</style>
</head>

<body>

<header>
<div class="nav">
<div class="logo" id="logo">
الفخامة <div class="logo-count" id="logoCount">0</div>
</div>
<div class="search">
<i class="fas fa-search"></i>
<input id="search" placeholder="ابحث عن المنتج...">
</div>
</div>
</header>

<div class="products" id="products"></div>

<!-- Product Popup -->
<div class="popup" id="popup">
<div class="popup-content">
<button class="popup-close" onclick="closePopup()">
<i class="fas fa-times"></i>
</button>
<div class="popup-gallery">
<div class="main-img" id="mainImg"></div>
<div class="thumbs" id="thumbs"></div>
</div>
<div class="popup-details">
<h1 class="p-title" id="pname"></h1>
<div class="p-price" id="pprice"></div>
<div class="p-category" id="pcat"></div>
</div>
</div>
</div>

<!-- Admin Panel -->
<div class="admin-overlay" id="adminOverlay">
<div class="admin-panel">
<div class="admin-header">
<h1 class="admin-title">لوحة التحكم</h1>
<p>أضف منتجاتك الفاخرة هنا</p>
</div>

<div class="form-group">
<label class="form-label">اسم المنتج</label>
<input class="form-input" id="pname-input" placeholder="مثال: تيشرت فاخر">
</div>

<div class="form-group">
<label class="form-label">السعر (€)</label>
<input class="form-input" id="pprice-input" placeholder="299" type="number">
</div>

<div class="form-group">
<label class="form-label">الفئة</label>
<select class="form-select" id="pcat-select">
<option value="ملابس">ملابس</option>
<option value="أحذية">أحذية</option>
<option value="ساعات">ساعات</option>
<option value="إكسسوارات">إكسسوارات</option>
</select>
</div>

<div class="form-group">
<label class="form-label">صور وفيديوهات المنتج</label>
<div class="upload-zone" id="uploadZone">
<i class="fas fa-cloud-upload-alt upload-icon"></i>
<div class="upload-text">اسحب الصور هنا أو اضغط للاختيار</div>
<div class="upload-hint">صور وفيديوهات متعددة - PNG, JPG, MP4</div>
<input type="file" id="mediaFiles" multiple accept="image/*,video/*">
</div>
<div class="files-preview" id="filesPreview"></div>
</div>

<button class="btn btn-primary" onclick="addProduct()">
<i class="fas fa-plus"></i> إضافة المنتج
</button>

<div class="admin-products" id="adminProducts">
<h3 style="margin-bottom:20px;color:var(--primary)">المنتجات المضافة:</h3>
</div>

<button class="btn btn-danger" onclick="closeAdmin()">
<i class="fas fa-times"></i> إغلاق
</button>
</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem('luxoraProducts')) || [];
let logoClicks = 0;
let currentProductMedia = [];
let currentProductIndex = -1;
let currentThumbIndex = 0;

// Secret Admin Access - 10 clicks on logo
document.getElementById('logo').addEventListener('click', (e) => {
    logoClicks++;
    document.getElementById('logoCount').style.display = 'flex';
    document.getElementById('logoCount').textContent = logoClicks;
    
    setTimeout(() => {
        logoClicks = 0;
        document.getElementById('logoCount').style.display = 'none';
    }, 3000);
    
    if (logoClicks >= 10) {
        setTimeout(() => {
            openAdmin();
            logoClicks = 0;
            document.getElementById('logoCount').style.display = 'none';
        }, 500);
    }
});

// Drag & Drop Upload
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('mediaFiles');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragover');
});
uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    handleFiles(files);
});

fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files);
});

function handleFiles(files) {
    for (let file of files) {
        if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentProductMedia.push({
                    src: e.target.result,
                    name: file.name,
                    type: file.type
                });
                renderPreview();
            };
            reader.readAsDataURL(file);
        }
    }
}

function renderPreview() {
    const preview = document.getElementById('filesPreview');
    preview.innerHTML = '';
    currentProductMedia.forEach((media, index) => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `
            ${media.type.startsWith('video/') ? 
                `<video src="${media.src}"></video>` : 
                `<img src="${media.src}" alt="${media.name}">`
            }
            <button class="preview-remove" onclick="removeMedia(${index})">
                <i class="fas fa-times"></i>
            </button>
        `;
        preview.appendChild(div);
    });
}

function removeMedia(index) {
    currentProductMedia.splice(index, 1);
    renderPreview();
}

// Render Products
function renderProducts(filteredProducts = products) {
    const container = document.getElementById('products');
    container.innerHTML = '';

    if (filteredProducts.length === 0) {
        container.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--secondary)">
                <i class="fas fa-search" style="font-size:80px;margin-bottom:20px;opacity:0.5"></i>
                <h2 style="font-size:28px;margin-bottom:10px">لا توجد منتجات</h2>
                <p style="opacity:0.7">جرب البحث بكلمة أخرى أو أضف منتجات جديدة</p>
            </div>
        `;
        return;
    }

    filteredProducts.forEach((product, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openProductPopup(index);
        card.innerHTML = `
            <div class="card-img">
                <img src="${product.media[0].src}" alt="${product.name}">
            </div>
            <div class="card-info">
                <div class="card-cat">${product.category}</div>
                <h3 class="card-name">${product.name}</h3>
                <div class
