<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxora Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#0f0f23;
color:#fff;
}

header{
background:#14142b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{font-size:22px;font-weight:bold}

.search input{
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

/* GRID 4 ITEMS PER ROW */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

@media(max-width:1000px){
.products{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
.products{grid-template-columns:1fr;}
}

.card{
background:#1c1c3a;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{transform:scale(1.05)}

.card img, .card video{
width:100%;
height:180px;
object-fit:cover;
}

.info{padding:10px}
.price{color:#8b5cf6;font-weight:bold}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#1c1c3a;
padding:20px;
border-radius:15px;
width:300px;
text-align:center;
}

/* ADMIN BUTTON */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
padding:12px;
border-radius:10px;
cursor:pointer;
}

/* ADMIN PANEL */
.panel{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.panel-box{
background:#1c1c3a;
padding:20px;
border-radius:15px;
width:320px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px;
width:100%;
margin-top:10px;
background:#8b5cf6;
color:#fff;
border:none;
cursor:pointer;
}

/* WHATSAPP BUTTON */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:12px;
border-radius:50%;
font-size:20px;
text-decoration:none;
color:#fff;
}
</style>
</head>

<body>

<header>
<div class="logo" id="logo">Luxora</div>
<div class="search"><input placeholder="بحث..."></div>
</header>

<div class="products" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h3 id="pname"></h3>
<p id="pprice"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<!-- ADMIN -->
<div class="admin-btn" onclick="openAdmin()">Admin</div>

<div class="panel" id="panel">
<div class="panel-box">
<h3>Admin Panel</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">

<select id="cat">
<option value="clothes">ملابس</option>
<option value="shoes">أحذية</option>
<option value="accessories">أكسسوارات</option>
</select>

<input type="file" id="file" multiple>

<button onclick="add()">➕ إضافة المنتج</button>
<button onclick="closeAdmin()">إغلاق</button>
</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/qr/WHVT75K5O3M2D1" target="_blank">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{
let media = p.media[0];

let tag = "";

if(media.includes("video")){
tag = `<video src="${media}" controls></video>`;
}else{
tag = `<img src="${media}">`;
}

box.innerHTML += `
<div class="card" onclick="openP(${i})">
${tag}
<div class="info">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>
</div>
</div>
`;
});
}
render();

/* ADD PRODUCT */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("file").files;

let media=[];

for(let i=0;i<files.length;i++){
let reader=new FileReader();

reader.onload=e=>{
media.push(e.target.result);

if(media.length===files.length){
products.push({name,price,cat,media});
localStorage.setItem("p",JSON.stringify(products));
render();
}
};

reader.readAsDataURL(files[i]);
}
}

/* POPUP */
function openP(i){
document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=products[i].name;
document.getElementById("pprice").innerText=products[i].price+" €";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* ADMIN PASSWORD */
function openAdmin(){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("panel").style.display="flex";
}else{
alert("Wrong password");
}
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
