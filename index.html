<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛍 ALDO SHOP - المتجر الرسمي</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Arial,sans-serif;
background:linear-gradient(135deg,#0c0c0c 0%,#1a1a2e 50%,#16213e 100%);
color:#fff;
min-height:100vh;
overflow-x:hidden;
}

.container{
max-width:1400px;
margin:0 auto;
padding:0 15px;
}

/* HEADER */
header{
background:linear-gradient(135deg,#ff4757,#ff6b7a);
padding:20px 0;
box-shadow:0 8px 32px rgba(255,71,87,0.3);
position:sticky;
top:0;
z-index:1000;
}

.header-content{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.logo{
font-size:2.2em;
font-weight:800;
background:linear-gradient(45deg,#fff,#f0f0f0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.search-box{
flex:1;
max-width:400px;
position:relative;
}

.search-box input{
width:100%;
padding:12px 50px 12px 20px;
border:none;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:#fff;
font-size:16px;
outline:none;
transition:all 0.3s ease;
}

.search-box input::placeholder{
color:#ccc;
}

.search-box input:focus{
background:rgba(255,255,255,0.2);
box-shadow:0 0 20px rgba(255,255,255,0.2);
transform:scale(1.02);
}

.search-icon{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
color:#fff;
font-size:18px;
}

/* TABS */
.tabs{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:15px 0;
margin:20px 0;
border-radius:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.tabs-content{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.tab-btn{
padding:12px 24px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,rgba(255,255,255,0.2),rgba(255,255,255,0.1));
color:#fff;
font-weight:600;
font-size:14px;
cursor:pointer;
transition:all 0.3s ease;
backdrop-filter:blur(10px);
position:relative;
overflow:hidden;
}

.tab-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(255,71,87,0.4);
background:linear-gradient(45deg,#ff4757,#ff6b7a);
}

.tab-btn.active{
background:linear-gradient(45deg,#25D366,#32c852);
box-shadow:0 10px 30px rgba(37,211,102,0.4);
}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:30px 0;
}

.product-card{
background:linear-gradient(145deg,#1a1a2e,#16213e);
border-radius:20px;
overflow:hidden;
transition:all 0.4s ease;
cursor:pointer;
position:relative;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.product-card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:4px;
background:linear-gradient(90deg,#ff4757,#25D366,#ff6b7a);
}

.product-card:hover{
transform:translateY(-15px) scale(1.02);
box-shadow:0 25px 60px rgba(255,71,87,0.3);
}

.media-container{
position:relative;
overflow:hidden;
height:220px;
}

.media-container img,
.media-container video{
width:100%;
height:100%;
object-fit:cover;
transition:transform 0.5s ease;
}

.product-card:hover .media-container img,
.product-card:hover .media-container video{
transform:scale(1.1);
}

.category-badge{
position:absolute;
top:15px;
right:15px;
padding:8px 12px;
background:rgba(37,211,102,0.9);
color:#fff;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.info{
padding:25px;
text-align:center;
}

.info h3{
margin-bottom:10px;
font-size:20px;
font-weight:700;
background:linear-gradient(45deg,#fff,#f0f0f0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.price{
font-size:24px;
font-weight:800;
background:linear-gradient(45deg,#ff4757,#ff6b7a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
margin-bottom:20px;
}

.buy-btn{
width:100%;
padding:15px;
border:none;
background:linear-gradient(45deg,#25D366,#32c852);
color:#fff;
font-weight:700;
font-size:16px;
border-radius:12px;
cursor:pointer;
transition:all 0.3s ease;
position:relative;
overflow:hidden;
}

.buy-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(37,211,102,0.4);
}

/* POPUP */
.popup-overlay{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(15px);
z-index:9999;
justify-content:center;
align-items:center;
padding:20px;
}

.popup-content{
max-width:500px;
width:100%;
background:linear-gradient(145deg,#1a1a2e,#16213e);
border-radius:25px;
padding:30px;
text-align:center;
position:relative;
animation:popupSlideIn 0.4s ease;
box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

@keyframes popupSlideIn{
from{transform:scale(0.7) rotate(-5deg);opacity:0;}
to{transform:scale(1) rotate(0);opacity:1;}
}

.popup-close{
position:absolute;
top:15px;
right:15px;
width:40px;
height:40px;
border-radius:50%;
background:#ff4757;
border:none;
color:#fff;
font-size:18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:all 0.3s ease;
}

.popup-close:hover{
background:#ff6b7a;
transform:rotate(90deg) scale(1.1);
}

.popup-media{
margin:20px 0;
border-radius:15px;
overflow:hidden;
max-height:300px;
}

.popup-media img,
.popup-media video{
width:100%;
height:300px;
object-fit:cover;
}

.popup-title{
font-size:28px;
font-weight:800;
margin:20px 0;
background:linear-gradient(45deg,#fff,#f0f0f0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.popup-price{
font-size:32px;
font-weight:900;
background:linear-gradient(45deg,#ff4757,#ff6b7a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin:15px 0;
}

/* CLICK COUNTER */
.click-area{
width:200px;
height:200px;
margin:20px auto;
background:linear-gradient(45deg,#ff6b6b,#4ecdc4);
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
color:white;
cursor:pointer;
transition:all 0.3s ease;
border:5px solid transparent;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
user-select:none;
}

.click-area:hover{
transform:scale(1.05);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.click-area:active{
transform:scale(0.95);
}

.counter-display{
font-size:28px;
font-weight:800;
margin-top:10px;
color:#fff;
text-shadow:2px 2px 4px rgba(0,0,0,0.5);
}

/* ADMIN PANEL */
.admin-overlay,
.pass-overlay{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(20px);
display:none;
justify-content:center;
align-items:center;
z-index:10000;
padding:20px;
}

.pass-container,
.admin-container,
.click-container{
background:linear-gradient(145deg,#1a1a2e,#16213e);
border-radius:25px;
padding:40px;
max-width:500px;
width:100%;
box-shadow:0 30px 80px rgba(0,0,0,0.5);
text-align:center;
}

.click-container h3{
margin-bottom:30px;
font-size:26px;
background:linear-gradient(45deg,#ff6b6b,#4ecdc4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.admin-container{
max-height:90vh;
overflow-y:auto;
padding-bottom:20px;
}

.admin-container h2{
text-align:center;
margin-bottom:30px;
font-size:28px;
background:linear-gradient(45deg,#25D366,#32c852);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#ccc;
}

.form-group input,
.form-group select{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:#fff;
font-size:16px;
transition:all 0.3s ease;
}

.form-group input::placeholder{
color:#aaa;
}

.form-group input:focus,
.form-group select:focus{
outline:none;
background:rgba(255,255,255,0.2);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.btn-primary{
width:100%;
padding:15px;
border:none;
background:linear-gradient(45deg,#25D366,#32c852);
color:#fff;
font-weight:700;
font-size:16px;
border-radius:15px;
cursor:pointer;
transition:all 0.3s ease;
margin:10px 0;
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(37,211,102,0.4);
}

.btn-danger{
background:linear-gradient(45deg,#ff4757,#ff6b7a) !important;
}

.admin-product{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:20px;
margin:15px 0;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
transition:all 0.3s ease;
cursor:pointer;
}

.admin-product:hover{
background:rgba(255,255,255,0.1);
transform:translateX(-5px);
}

.admin-product-media{
width:80px;
height:60px;
border-radius:10px;
object-fit:cover;
}

.admin-product-info h4{
font-size:18px;
margin-bottom:5px;
}

.admin-product-info p{
color:#ccc;
font-size:14px;
}

.delete-btn{
background:linear-gradient(45deg,#ff4757,#ff6b7a);
padding:8px 15px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:1200px){
.products{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));}
}

@media(max-width:768px){
.header-content{flex-direction:column;text-align:center;}
.search-box{margin:15px 0;}
.tabs-content{flex-direction:column;gap:10px;}
.products{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
}

@media(max-width:480px){
.products{grid-template-columns:1fr;}
.logo{font-size:1.8em;}
.popup-content{padding:20px;}
.click-area{width:150px;height:150px;font-size:16px;}
}
</style>
</head>

<body>
<div class="container">

<header>
<div class="header-content">
<div class="logo">🛍 ALDO SHOP</div>
<div class="search-box">
<input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج..." onkeyup="searchProducts()">
<div class="search-icon">🔍</div>
</div>
</div>
</header>

<!-- TABS -->
<div class="tabs">
<div class="tabs-content">
<button class="tab-btn active" onclick="filter('all')">الكل</button>
<button class="tab-btn" onclick="filter('shoes')">👟 أحذية</button>
<button class="tab-btn" onclick="filter('clothes')">👕 ملابس</button>
<button class="tab-btn" onclick="filter('watches')">⌚ ساعات</button>
<button class="tab-btn" onclick="openAdmin()">⚙️ الإدارة</button>
</div>
</div>

<div class="products" id="products"></div>

</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">
<div class="popup-content" id="popupContent">
<button class="popup-close" onclick="closePopup()">✕</button>
</div>
</div>

<!-- PASSWORD -->
<div class="pass-overlay" id="passBox">
<div class="pass-container">
<h3>🔐 لوحة التحكم</h3>
<input type="password" id="pass" placeholder="أدخل كلمة المرور">
<button class="btn-primary" onclick="checkPass()">دخول</button>
</div>
</div>

<!-- CLICK COUNTER -->
<div class="admin-overlay" id="clickBox">
<div class="click-container">
<h3>🎯 اضغط 10 مرات للوصول للإدارة المتقدمة</h3>
<div class="click-area" id="clickArea">
اضغط هنا
</div>
<div class="counter-display" id="clickCounter">0/10</div>
</div>
</div>

<!-- ADMIN -->
<div class="admin-overlay" id="adminBox">
<div class="admin-container">
<h2>⚙️ لوحة التحكم المتقدمة</h2>

<div class="form-group">
<label>اسم المنتج</label>
<input id="name" placeholder="أدخل اسم المنتج">
</div>

<div class="form-group">
<label>السعر (€)</label>
<input id="price" type="number" placeholder="أدخل السعر">
</div>

<div class="form-group">
<label>الفئة</label>
<select id="category">
<option value="shoes">👟 أحذية</option>
<option value="clothes">👕 ملابس</option>
<option value="watches">⌚ ساعات</option>
</select>
</div>

<div class="form-group">
<label>الصور/الفيديوهات</label>
<input type="file" id="mediaInput" accept="image/*,video/*" multiple>
<div id="mediaPreview" style="display:none;margin-top:10px;"></div>
</div>

<button class="btn-primary" onclick="addProduct()">➕ إضافة المنتج</button>
<hr style="margin:30px 0;border:1px solid rgba(255,255,255,0.1);">

<h3 style="text-align:center;margin-bottom:20px;">📦 قائمة المنتجات</h3>
<div id="adminList"></div>

<button class="btn-primary btn-danger" onclick="closeAdmin()">❌ إغلاق</button>
</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let currentFilter = "all";
let clickCount = 0;
let adminAccess = false;

// إضافة منتجات افتراضية جميلة
if(products.length === 0){
products = [
{
name: "أحذية رياضية أديداس",
price: "89",
category: "shoes",
media: [{src: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=300&fit=crop", type: "image"}]
},
{
name: "قميص كلوب",
price: "45",
category: "clothes",
media: [{src: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=400&h=300&fit=crop", type: "image"}]
},
{
name: "ساعة رولكس كلاسيك",
price: "299",
category: "watches",
media: [{src: "https://images.unsplash.com/photo-1524592094714-0f0652a74b10?w=400&h=300&fit=crop", type: "image"}]
}
];
save();
render();
}

/* حفظ البيانات */
function save(){
localStorage.setItem("products", JSON.stringify(products));
}

/* البحث */
function searchProducts(){
let query = document.getElementById("searchInput").value.toLowerCase();
let filtered = products.filter(p => 
p.name.toLowerCase().includes(query) || 
currentFilter === "all" || p.category === currentFilter
);
render(filtered);
}

/* التصفية */
function filter(type){
currentFilter = type;
document.querySelectorAll('.tab-btn').forEach(btn =>
