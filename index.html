<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store IT</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f23;
color:#fff;
}

/* HEADER */
header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

/* CATEGORIES */
.cats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:15px;
}

.cats button{
padding:10px 18px;
border-radius:25px;
border:none;
cursor:pointer;
background:#2a2a50;
color:#fff;
transition:0.3s;
}

.cats button.active{
background:#8b5cf6;
}

/* GRID 4 */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:15px;
}

@media(max-width:900px){
.products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.products{grid-template-columns:repeat(1,1fr);}
}

/* CARD (واضحة واحترافية) */
.card{
background:#1c1c3a;
border-radius:15px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* IMAGE BIG & CLEAR */
.card img,.card video{
width:100%;
height:160px;
object-fit:cover;
display:block;
}

/* NAME */
.card h4{
font-size:14px;
margin:10px 0 5px;
color:#fff;
}

/* PRICE */
.card p{
font-size:14px;
color:#8b5cf6;
font-weight:bold;
margin-bottom:10px;
}

/* HOVER */
.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 40px rgba(139,92,246,0.3);
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
text-align:center;
width:260px;
}

/* ADMIN BUTTON */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
padding:10px 15px;
background:#8b5cf6;
border:none;
border-radius:10px;
color:#fff;
cursor:pointer;
}

/* ADMIN PANEL */
.admin{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.admin-box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:300px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<header>💎 Aldo Store</header>

<!-- CATEGORIES -->
<div class="cats">
<button class="active" onclick="filter('all',this)">Tutto</button>
<button onclick="filter('clothes',this)">👕 visteti</button>
<button onclick="filter('shoes',this)">👟 Scarpe</button>
<button onclick="filter('acc',this)">💍 Accessori</button>
<button onclick="filtrt('acc',this)"
>💼 rimborsi</button>
<button onclick="filter('perfume',this)">🌹 Profumi</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">
<h3 id="pname"></h3>
<p id="pprice"></p>
<button onclick="closeP()">Chiudi</button>
</div>
</div>

<!-- ADMIN -->
<button class="admin-btn" onclick="openAdmin()">Admin</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">

<select id="cat">
<option value="shoes">Shoes</option>
<option value="clothes">Parfank</option>
<option value="acc">Acc</option>
<option value="perfume">Perfume</option>
</select>

<input type="file" id="files" multiple accept="image/*,video/*">

<button onclick="add()">Add</button>
<button onclick="closeAdmin()">Close</button>

</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];
let current="all";

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products
.filter(p=>current==="all"||p.cat===current)
.forEach((p,i)=>{

let media="";

if(p.media[0].includes("video")){
media=`<video src="${p.media[0]}" autoplay muted loop></video>`;
}else{
media=`<img src="${p.media[0]}">`;
}

box.innerHTML+=`
<div class="card" onclick="openP(${i})">
${media}
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;
});
}
render();

/* FILTER */
function filter(c,btn){
current=c;

document.querySelectorAll(".cats button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

render();
}

/* ADD PRODUCT */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("files").files;

let media=[];

for(let i=0;i<files.length;i++){
let reader=new FileReader();

reader.onload=e=>{
media.push(e.target.result);

if(media.length===files.length){
products.push({name,price,cat,media});
localStorage.setItem("p",JSON.stringify(products));
render();
closeAdmin();
}
};

reader.readAsDataURL(files[i]);
}
}

/* POPUP */
function openP(i){
let p=products[i];
document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=p.name;
document.getElementById("pprice").innerText=p.price;
}

function closeP(){
document.getElementById("popup").style.display="none";
}

/* ADMIN */
function openAdmin(){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("admin").style.display="flex";
}else{
alert("Wrong password");
}
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

</script>

</body>
</html>
