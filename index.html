<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f23;
color:#fff;
}

header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

.cats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:15px;
}

.cats button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#2a2a50;
color:#fff;
cursor:pointer;
}

.cats button.active{
background:#8b5cf6;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
padding:15px;
}

.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
text-align:center;
aspect-ratio:4/5;
}

.card img{
width:100%;
height:70%;
object-fit:cover;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}

.box img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.gallery img{
width:50px;
height:50px;
object-fit:cover;
margin:5px;
cursor:pointer;
border-radius:6px;
border:2px solid transparent;
}

.gallery img.active{
border-color:#8b5cf6;
}

button{
cursor:pointer;
}
</style>
</head>

<body>

<header>Aldo Store</header>

<div class="cats">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('shoes',this)">Shoes</button>
<button onclick="filter('clothes',this)">Clothes</button>
<button onclick="filter('acc',this)">Acc</button>
<button onclick="filter('perfume',this)">Perfume</button>
</div>

<div class="products" id="products"></div>

<div class="popup" id="popup">
<div class="box">
<h3 id="name"></h3>
<p id="price"></p>

<div class="gallery" id="gallery"></div>
<img id="mainImg">

<button onclick="closeP()">Close</button>
</div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("p")) || [];

/* IMPORTANT: demo data باش يخدم للناس كاملين */
if(products.length === 0){
products = [
{
id:1,
name:"Nike Shoes",
price:"120€",
cat:"shoes",
media:[
"https://images.unsplash.com/photo-1606813907291-d86efa9b94db?w=500"
]
},
{
id:2,
name:"T-Shirt",
price:"50€",
cat:"clothes",
media:[
"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"
]
}
];
save();
}

let current="all";
let currentProduct=null;

function save(){
localStorage.setItem("p",JSON.stringify(products));
}

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.filter(p=>current==="all"||p.cat===current)
.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openP(${p.id})">
<img src="${p.media[0]}">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;
});
}

/* FILTER */
function filter(c,btn){
current=c;
document.querySelectorAll(".cats button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

/* OPEN */
function openP(id){
currentProduct = products.find(p=>p.id===id);

document.getElementById("popup").style.display="flex";
document.getElementById("name").innerText=currentProduct.name;
document.getElementById("price").innerText=currentProduct.price;

document.getElementById("mainImg").src=currentProduct.media[0];

/* gallery */
let g=document.getElementById("gallery");
g.innerHTML="";

currentProduct.media.forEach((img,i)=>{
g.innerHTML+=`
<img src="${img}" onclick="changeImg(${i})">
`;
});
}

function changeImg(i){
document.getElementById("mainImg").src=currentProduct.media[i];
}

function closeP(){
document.getElementById("popup").style.display="none";
}

render();
</script>

</body>
</html>
