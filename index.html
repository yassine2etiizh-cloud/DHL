<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f23,#1a1a2e);
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#14142b;
position:sticky;
top:0;
}

.logo{
font-size:22px;
font-weight:bold;
cursor:pointer;
color:#8b5cf6;
}

/* CATEGORIES */
.cats{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:15px;
}

.cats button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2a2a50;
color:#fff;
transition:0.3s;
}

.cats button:hover{
background:#8b5cf6;
}

.cats button.active{
background:#8b5cf6;
}

/* GRID 4 PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
}

.card img,.card video{
width:100%;
height:140px;
object-fit:cover;
}

.card h4{
margin:10px 0 5px;
}

.price{
color:#8b5cf6;
font-weight:bold;
margin-bottom:10px;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}

/* ADMIN */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
padding:12px;
border-radius:10px;
cursor:pointer;
}

/* PANEL */
.panel{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.panel-box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:320px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
}

button{
background:#8b5cf6;
color:#fff;
cursor:pointer;
}

/* DELETE */
.del{
background:red;
margin-top:5px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:12px;
border-radius:50%;
font-size:20px;
text-decoration:none;
color:#fff;
}
</style>
</head>

<body>

<header>
<div class="logo" id="logo">Luxury Store</div>
</header>

<!-- CATEGORIES -->
<div class="cats">
<button class="active" onclick="filter('all')">الكل</button>
<button onclick="filter('shoes')">👟 أحذية</button>
<button onclick="filter('clothes')">👕 ملابس</button>
<button onclick="filter('perfume')">🌸 عطور</button>
<button onclick="filter('acc')">💎 إكسسوارات</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">
<h3 id="pname"></h3>
<p id="pprice"></p>
<button onclick="closeP()">إغلاق</button>
</div>
</div>

<!-- ADMIN BUTTON -->
<div class="admin-btn" onclick="openAdmin()">⚙️ Admin</div>

<!-- ADMIN PANEL -->
<div class="panel" id="panel">
<div class="panel-box">

<h3>Admin Panel</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">

<select id="cat">
<option value="shoes">أحذية</option>
<option value="clothes">ملابس</option>
<option value="perfume">عطور</option>
<option value="acc">إكسسوارات</option>
</select>

<input type="file" id="file" multiple accept="image/*,video/*">

<button onclick="add()">إضافة منتج</button>
<button onclick="closeAdmin()">إغلاق</button>

</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/393510798667" target="_blank">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];
let current="all";
let clicks=0;

/* secret admin */
document.getElementById("logo").onclick=()=>{
clicks++;
setTimeout(()=>clicks=0,3000);

if(clicks===10){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("panel").style.display="flex";
}else{
alert("Wrong password");
}
}
};

/* render */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

let list=products.filter(p=>current==="all"||p.cat===current);

list.forEach((p,i)=>{
let m=p.media[0];

box.innerHTML+=`
<div class="card" onclick="openP(${i})">

${m.includes("video")?
`<video src="${m}" muted></video>`:
`<img src="${m}">`
}

<h4>${p.name}</h4>
<p class="price">${p.price} €</p>

<button class="del" onclick="del(event,${i})">حذف</button>

</div>`;
});
}
render();

/* filter */
function filter(c){
current=c;
render();
}

/* add product */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("file").files;

let media=[];

for(let i=0;i<files.length;i++){
let reader=new FileReader();

reader.onload=e=>{
media.push(e.target.result);

if(media.length===files.length){
products.push({name,price,cat,media});
localStorage.setItem("p",JSON.stringify(products));
render();
}
}

reader.readAsDataURL(files[i]);
}
}

/* delete */
function del(e,i){
e.stopPropagation();
products.splice(i,1);
localStorage.setItem("p",JSON.stringify(products));
render();
}

/* popup */
function openP(i){
document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=products[i].name;
document.getElementById("pprice").innerText=products[i].price+" €";
}

function closeP(){
document.getElementById("popup").style.display="none";
}

/* admin */
function openAdmin(){
document.getElementById("panel").style.display="flex";
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
