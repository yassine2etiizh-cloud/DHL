<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f23;
color:#fff;
direction:rtl;
}

/* HEADER */
header{
text-align:center;
padding:20px;
background:linear-gradient(135deg,#14142b,#8b5cf6);
font-size:24px;
font-weight:bold;
color:#fff;
text-shadow:0 2px 10px rgba(139,92,246,0.5);
}

/* CATEGORIES */
.cats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:20px;
}

.cats button{
padding:10px 18px;
border-radius:25px;
border:none;
cursor:pointer;
background:#2a2a50;
color:#fff;
font-size:14px;
font-weight:500;
transition:0.3s;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.cats button:hover{
transform:translateY(-2px);
}

.cats button.active{
background:linear-gradient(45deg,#8b5cf6,#a855f7);
box-shadow:0 6px 20px rgba(139,92,246,0.6);
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
max-width:1400px;
margin:0 auto;
}

/* CARD */
.card{
background:linear-gradient(145deg,#1c1c3a,#2a2a50);
border-radius:20px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.4s;
aspect-ratio:1/1.4;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
border:2px solid transparent;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 20px 40px rgba(139,92,246,0.4);
border-color:#8b5cf6;
}

.card img{
width:100%;
height:70%;
object-fit:cover;
transition:0.3s;
}

.card h4{
font-size:14px;
margin:8px 0;
color:#fff;
}

.card p{
font-size:16px;
margin:0;
background:linear-gradient(45deg,#8b5cf6,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
backdrop-filter:blur(10px);
}

.box{
background:linear-gradient(145deg,#1c1c3a,#2a2a50);
padding:30px;
border-radius:25px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 30px 60px rgba(0,0,0,0.8);
border:2px solid rgba(139,92,246,0.3);
}

.box img{
width:100%;
max-height:400px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* IMAGE GALLERY - الجديد */
.gallery{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin:15px 0;
}

.gallery img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
border:3px solid transparent;
}

.gallery img:hover,
.gallery img.active{
border-color:#8b5cf6;
transform:scale(1.1);
box-shadow:0 5px 20px rgba(139,92,246,0.6);
}

.wa-btn{
display:block;
background:linear-gradient(45deg,#25D366,#128C7E);
color:#fff;
padding:15px 25px;
border-radius:50px;
text-decoration:none;
margin:15px 0;
font-weight:bold;
font-size:16px;
transition:0.3s;
box-shadow:0 8px 25px rgba(37,211,102,0.4);
}

.wa-btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 35px rgba(37,211,102,0.6);
}

.close-btn{
background:linear-gradient(45deg,#ef4444,#dc2626);
color:#fff;
border:none;
padding:12px 25px;
border-radius:50px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.3s;
box-shadow:0 8px 25px rgba(239,68,68,0.4);
}

.close-btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 35px rgba(239,68,68,0.6);
}

/* FLOAT */
.float-wa{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(45deg,#25D366,#128C7E);
padding:15px 20px;
border-radius:50px;
color:#fff;
text-decoration:none;
font-size:18px;
box-shadow:0 10px 30px rgba(37,211,102,0.5);
transition:0.3s;
}

.float-wa:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 15px 40px rgba(37,211,102,0.7);
}

/* ADMIN */
.admin-btn{
position:fixed;
bottom:25px;
left:25px;
background:linear-gradient(45deg,#8b5cf6,#a855f7);
border:none;
padding:15px 20px;
border-radius:50px;
color:#fff;
cursor:pointer;
font-size:16px;
font-weight:bold;
box-shadow:0 10px 30px rgba(139,92,246,0.5);
transition:0.3s;
}

.admin-btn:hover{
transform:translateY(-5px);
box-shadow:0 15px 40px rgba(139,92,246,0.7);
}

.admin{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
backdrop-filter:blur(10px);
}

.admin-box{
background:linear-gradient(145deg,#1c1c3a,#2a2a50);
padding:30px;
border-radius:25px;
width:90%;
max-width:400px;
box-shadow:0 30px 60px rgba(0,0,0,0.8);
border:2px solid rgba(139,92,246,0.3);
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:12px;
background:#2a2a50;
color:#fff;
font-size:14px;
box-sizing:border-box;
}

input::placeholder{
color:#aaa;
}

/* DELETE */
.admin-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#2a2a50;
padding:12px;
border-radius:12px;
margin:10px 0;
font-size:14px;
transition:0.3s;
}

.admin-item:hover{
background:#3a3a70;
transform:translateX(-5px);
}

.admin-item img{
width:50px;
height:50px;
object-fit:cover;
border-radius:8px;
}

.admin-item button{
background:linear-gradient(45deg,#ef4444,#dc2626);
border:none;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

.admin-item button:hover{
transform:scale(1.1);
box-shadow:0 5px 15px rgba(239,68,68,0.6);
}

@media (max-width:768px){
.products{
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.cats{
gap:8px;
padding:15px;
}

.cats button{
padding:8px 14px;
font-size:12px;
}
}
</style>
</head>

<body>

<header>🏆 Aldo Footlocker Store 🏆</header>

<!-- CATEGORIES -->
<div class="cats">
<button class="active" onclick="filter('all',this)">👑 الكل</button>
<button onclick="filter('clothes',this)">👕 ملابس</button>
<button onclick="filter('shoes',this)">👟 أحذية</button>
<button onclick="filter('acc',this)">💍 إكسسوارات</button>
<button onclick="filter('perfume',this)">🌹 عطور</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">
<h3 id="pname"></h3>
<p id="pprice"></p>
<!-- IMAGE GALLERY -->
<div class="gallery" id="gallery"></div>
<img id="pimg">
<a id="waLink" class="wa-btn" target="_blank">📲 اطلب واتساب</a>
<button class="close-btn" onclick="closeP()">❌ إغلاق</button>
</div>
</div>

<!-- FLOAT WA -->
<a class="float-wa" href="https://wa.me/393510798667" target="_blank">💬 واتساب</a>

<!-- ADMIN -->
<button class="admin-btn" onclick="openAdmin()">🔧 أدمن</button>

<div class="admin" id="admin">
<div class="admin-box">
<h3>➕ إضافة منتج جديد</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<select id="cat">
<option value="shoes">👟 أحذية</option>
<option value="clothes">👕 ملابس</option>
<option value="acc">💍 إكسسوارات</option>
<option value="perfume">🌹 عطور</option>
</select>
<input type="file" id="files" multiple accept="image/*">
<button class="wa-btn" onclick="add()">✅ إضافة المنتج</button>

<hr style="margin:25px 0;">
<h3>🗑️ حذف المنتجات</h3>
<div id="adminList"></div>
<button class="close-btn" onclick="closeAdmin()">❌ إغلاق</button>
</div>
</div>

<script>
/* PRODUCTS */
let products = JSON.parse(localStorage.getItem("p")) || [];

if(products.length === 0){
products = [
{id:1,name:"Nike Air Force 1",price:"120€",cat:"shoes",media:["https://images.unsplash.com/photo-1606813907291-d86efa9b94db?w=500"]},
{id:2,name:"Adidas Hoodie",price:"80€",cat:"clothes",media:["https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"]},
{id:3,name:"Rolex Watch",price:"250€",cat:"acc",media:["https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"]},
{id:4,name:"Dior Sauvage",price:"95€",cat:"perfume",media:["https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=500"]}
];
localStorage.setItem("p",JSON.stringify(products));
}

let current="all";

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";
products
.filter(p=>current==="all"||p.cat===current)
.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openP(${p.id})">
<img src="${p.media[0]}">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;
});
}

/* FILTER */
function filter(c,btn){
current=c;
document.querySelectorAll(".cats button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

/* OPEN PRODUCT مع معرض الصور */
function openP(id){
let p=products.find(x=>x.id===id);
if(!p) return;

document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=p.name;
document.getElementById("pprice").innerText=p.price;
document.getElementById("pimg").src=p.media[0];

// عرض معرض الصور الجديد
let gallery = document.getElementById("gallery");
gallery.innerHTML = "";
p.media.forEach((img, index) => {
  gallery.innerHTML += `
    <img src="${img}" onclick="changeImg(${index}, ${id})" class="${index===0?'active':''}">
  `;
});

document.getElementById("waLink").href=
`https://wa.me/393510798667?text=${encodeURIComponent(p.name+" - "+p.price)}`;
}

// تغيير الصورة في المعرض
function changeImg(index, productId){
let p=products.find(x=>x.id===productId);
document.getElementById("pimg").src = p.media[index];

// تحديث active class
document.querySelectorAll('#gallery img').forEach((img, i) => {
  img.classList.toggle('active', i === index);
});
}

function closeP(){
document.getElementById("popup").style.display="none";
}

/* ADMIN */
function openAdmin(){
let pass=prompt("كلمة السر:");
if(pass==="200911"){
document.getElementById("admin").style.display="flex";
renderAdmin();
} else {
alert("❌ كلمة السر غلط!");
}
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

/* ADD */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("files").files;

if(!name || !price || files.length===0){
alert("❌ املأ كل الحقول وارفع صور!");
return;
}

let media=[];
let loaded=0;

for(let i=0;i<files.length;i++){
let reader=new FileReader();
reader.onload=e=>{
media.push(e.target.result);
loaded++;
if(loaded===files.length){
products.push({
id:Date.now(),
name,
price,
cat,
media
});
localStorage.setItem("p",JSON.stringify(products));
render();
renderAdmin();
closeAdmin();
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("files").value="";
alert("✅ تمت إضافة المنتج بنجاح!");
}
};
reader.readAsDataURL(files[i]);
}
}

/* ADMIN LIST */
function renderAdmin(){
let box=document.getElementById("adminList");
box.innerHTML="";
products.forEach(p=>{
box.innerHTML+=`
<div class="admin-item">
<div style="display:flex;gap:15px;align-items:center;">
<img src="${p.media[0]}">
<span>${p.name} - ${p.price}</span>
</div>
<button onclick="delProduct(${p.id})">❌ حذف</button>
</div>
`;
});
}

/* DELETE */
function delProduct(id){
if(confirm("هل أنت متأكد من حذف هذا المنتج؟")){
products=products.filter(p=>p.id!==id);
localStorage.setItem("p",JSON.stringify(products));
render();
renderAdmin();
}
}

render();
</script>

</body>
</html>
