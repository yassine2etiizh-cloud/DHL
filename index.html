<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxora Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f23;
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#14142b;
position:sticky;
top:0;
}

.logo{font-size:20px;font-weight:bold;cursor:pointer}

.search input{
padding:8px;
border:none;
border-radius:8px;
outline:none;
}

/* FILTER */
.tabs{
display:flex;
justify-content:center;
gap:8px;
padding:10px;
flex-wrap:wrap;
}

.tabs button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2a2a4a;
color:#fff;
}

.tabs button.active{
background:#8b5cf6;
}

/* PRODUCTS 4 IN ROW */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1c1c3a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
font-size:12px;
}

.card:hover{transform:scale(1.03)}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.info{padding:6px}

.price{color:#8b5cf6;font-weight:bold}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#1c1c3a;
padding:15px;
border-radius:10px;
width:250px;
text-align:center;
}

/* ADMIN */
.admin-btn{
position:fixed;
bottom:70px;
left:15px;
background:#8b5cf6;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.panel{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.panel-box{
background:#1c1c3a;
padding:15px;
border-radius:10px;
width:300px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

button{
width:100%;
padding:8px;
margin-top:5px;
background:#8b5cf6;
border:none;
color:#fff;
cursor:pointer;
}

/* ADMIN LIST */
.admin-list{
max-height:200px;
overflow:auto;
margin-top:10px;
}

.admin-item{
display:flex;
justify-content:space-between;
background:#2a2a4a;
padding:5px;
margin:5px 0;
border-radius:5px;
font-size:12px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#fff;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<div class="logo" id="logo">Luxora</div>
<div class="search">
<input id="search" placeholder="بحث..." oninput="search()">
</div>
</header>

<!-- FILTER -->
<div class="tabs">
<button class="active" onclick="setFilter('all')">الكل</button>
<button onclick="setFilter('shoes')">أحذية</button>
<button onclick="setFilter('clothes')">ملابس</button>
<button onclick="setFilter('acc')">أكسسوارات</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h3 id="pname"></h3>
<p id="pprice"></p>
<button onclick="closePopup()">إغلاق</button>
</div>
</div>

<!-- ADMIN BUTTON -->
<div class="admin-btn" onclick="openAdmin()">Admin</div>

<!-- ADMIN PANEL -->
<div class="panel" id="panel">
<div class="panel-box">

<h3>Admin Panel</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">

<select id="cat">
<option value="shoes">أحذية</option>
<option value="clothes">ملابس</option>
<option value="acc">أكسسوارات</option>
</select>

<input type="file" id="file" multiple>

<button onclick="add()">إضافة منتج</button>

<div class="admin-list" id="adminList"></div>

<button onclick="closeAdmin()">إغلاق</button>

</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/393510798667" target="_blank">
💬
</a>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];
let filterType = "all";
let clicks = 0;

/* SECRET ADMIN (10 clicks) */
document.getElementById("logo").onclick = () => {
clicks++;
setTimeout(()=>clicks=0,2000);
if(clicks>=10){
document.getElementById("panel").style.display="flex";
clicks=0;
}
}

/* SAVE */
function save(){
localStorage.setItem("p",JSON.stringify(products));
}

/* SEARCH ENGINE */
function search(){
let q=document.getElementById("search").value.toLowerCase().trim();

if(q===""){
render();
return;
}

let filtered = products.filter(p =>
(p.name && p.name.toLowerCase().includes(q)) ||
(p.cat && p.cat.toLowerCase().includes(q)) ||
(p.price && p.price.toString().includes(q))
);

renderFiltered(filtered);
}

/* FILTER */
function setFilter(t){
filterType=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
render();
}

/* RENDER */
function render(){
let list=products;

if(filterType!="all"){
list=list.filter(p=>p.cat===filterType);
}

renderFiltered(list);
adminList();
}

/* RENDER FILTERED */
function renderFiltered(list){
let box=document.getElementById("products");
box.innerHTML="";

list.forEach((p,i)=>{
box.innerHTML+=`
<div class="card" onclick="openP(${i})">
<img src="${p.media[0]}">
<div class="info">
<div>${p.name}</div>
<div class="price">${p.price} €</div>
</div>
</div>`;
});
}

/* ADD PRODUCT */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("file").files;

let media=[];

for(let i=0;i<files.length;i++){
let reader=new FileReader();
reader.onload=e=>{
media.push(e.target.result);

if(media.length===files.length){
products.push({name,price,cat,media});
save();
render();
}
}
reader.readAsDataURL(files[i]);
}
}

/* POPUP */
function openP(i){
document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=products[i].name;
document.getElementById("pprice").innerText=products[i].price+" €";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* ADMIN */
function openAdmin(){
document.getElementById("panel").style.display="flex";
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

/* ADMIN LIST */
function adminList(){
let box=document.getElementById("adminList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="admin-item">
<span>${p.name}</span>
<button onclick="del(${i})">حذف</button>
</div>`;
});
}

/* DELETE */
function del(i){
products.splice(i,1);
save();
render();
}

render();

</script>

</body>
</html>
