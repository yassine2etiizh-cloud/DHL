<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxora Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#0f0f23;
color:#fff;
overflow-x:hidden;
}

header{
position:sticky;
top:0;
background:#14142b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.logo{
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1c1c3a;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:scale(1.05)}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.info{padding:10px}

.price{color:#8b5cf6;font-weight:bold}

/* buttons */
.btn{
width:100%;
padding:10px;
margin-top:8px;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

.buy{
background:#25D366;
color:#fff;
}

/* ADMIN BUTTON */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
background:#8b5cf6;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.panel{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.panel-box{
background:#1c1c3a;
padding:20px;
border-radius:15px;
width:320px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
width:100%;
margin-top:10px;
background:#8b5cf6;
color:#fff;
border:none;
cursor:pointer;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div class="logo">Luxora</div>
</header>

<div class="products" id="products"></div>

<!-- ADMIN -->
<div class="admin-btn" onclick="openAdmin()">⚙ Admin</div>

<div class="panel" id="panel">
<div class="panel-box">

<h3>Admin Panel</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input type="file" id="file">

<button onclick="add()">Add Product</button>
<button onclick="closeAdmin()">Close</button>

</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];

/* render */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.media}">
<div class="info">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>

<button class="btn buy" onclick="buy('${p.name}','${p.price}')">
📱 اطلب عبر واتساب
</button>

</div>
</div>`;
});
}
render();

/* add product */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let file=document.getElementById("file").files[0];

let reader=new FileReader();
reader.onload=function(e){

products.push({
name:name,
price:price,
media:e.target.result
});

localStorage.setItem("p",JSON.stringify(products));
render();
closeAdmin();
}

reader.readAsDataURL(file);
}

/* whatsapp */
function buy(name,price){
let msg = `سلام، بغيت نشري:\n\n📦 المنتج: ${name}\n💰 الثمن: ${price} €`;
let url = `https://wa.me/qr/WHVT75K5O3M2D1?text=${encodeURIComponent(msg)}`;
window.open(url,"_blank");
}

/* admin */
function openAdmin(){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("panel").style.display="flex";
}else{
alert("Wrong password");
}
}

function closeAdmin(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
