<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store IT</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f23;
color:#fff;
}

/* HEADER */
header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

/* CATEGORIES */
.cats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:15px;
}

.cats button{
padding:8px 14px;
border-radius:25px;
border:none;
cursor:pointer;
background:#2a2a50;
color:#fff;
font-size:12px;
transition:0.3s;
}

.cats button.active{
background:#8b5cf6;
}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
gap:10px;
padding:15px;
}

/* CARD */
.card{
background:#1c1c3a;
border-radius:12px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 40px rgba(139,92,246,0.3);
}

/* IMAGE */
.card img,
.card video{
width:100%;
height:100px;
object-fit:cover;
display:block;
}

/* TEXT */
.card h4{
font-size:12px;
margin:8px 0 2px;
font-weight:600;
}

.card p{
font-size:11px;
color:#8b5cf6;
margin:0 0 8px;
font-weight:bold;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
background:#1c1c3a;
padding:15px;
border-radius:12px;
text-align:center;
width:260px;
}

/* BIG IMAGE INSIDE POPUP */
#pimg{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* ADMIN BUTTON */
.admin-btn{
position:fixed;
bottom:20px;
left:20px;
padding:10px 15px;
background:#8b5cf6;
border:none;
border-radius:10px;
color:#fff;
cursor:pointer;
}

/* ADMIN */
.admin{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.admin-box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:300px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<header>💎 Luxury Store</header>

<!-- CATEGORIES -->
<div class="cats">
<button class="active" onclick="filter('all',this)">Tutto</button>
<button onclick="filter('clothes',this)">👕 visteti</button>
<button onclick="filter('shoes',this)">👟 Scarpe</button>
<button onclick="filter('acc',this)">💍 Accessori</button>
<button onclick="filter('perfume',this)">🌹 Profumi</button>
<button onclick="filter('imborsi',this)">💼 rimborsi</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">

<img id="pimg">

<h3 id="pname"></h3>
<p id="pprice"></p>

<button onclick="closeP()">Chiudi</button>

</div>
</div>

<!-- ADMIN -->
<button class="admin-btn" onclick="openAdmin()">Admin</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">

<select id="cat">
<option value="shoes">Shoes</option>
<option value="clothes">Clothes</option>
<option value="acc">Acc</option>
<option value="perfume">Perfume</option>
<option value="imborsi">Imborsi</option>
</select>

<input type="file" id="files" multiple accept="image/*,video/*">

<button onclick="add()">Add</button>
<button onclick="closeAdmin()">Close</button>

</div>
</div>

<script>

/* EMPTY START */
let products = [];

let current="all";

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products
.filter(p=>current==="all"||p.cat===current)
.forEach((p,i)=>{

let item=p.media[0];
let media="";

if(item.includes("video")){
media=`<video src="${item}" autoplay muted loop></video>`;
}else{
media=`<img src="${item}" onclick="openP(${i})">`;
}

box.innerHTML+=`
<div class="card">
${media}
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`;
});
}
render();

/* FILTER */
function filter(c,btn){
current=c;

document.querySelectorAll(".cats button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

render();
}

/* ADD */
function add(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("cat").value;
let files=document.getElementById("files").files;

let media=[];
let loaded=0;

for(let i=0;i<files.length;i++){
let reader=new FileReader();

reader.onload=e=>{
media.push(e.target.result);
loaded++;

if(loaded===files.length){
products.push({name,price,cat,media});
render();
closeAdmin();
}
};

reader.readAsDataURL(files[i]);
}
}

/* POPUP IMAGE */
function openP(i){
let p=products[i];

document.getElementById("popup").style.display="flex";
document.getElementById("pimg").src=p.media[0];
document.getElementById("pname").innerText=p.name;
document.getElementById("pprice").innerText=p.price;
}

function closeP(){
document.getElementById("popup").style.display="none";
}

/* ADMIN */
function openAdmin(){
let pass=prompt("Password:");
if(pass==="200911"){
document.getElementById("admin").style.display="flex";
}
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

</script>

</body>
</html>
