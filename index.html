<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f0f23,#1c1c3a);
color:#fff;
}

/* HEADER */
header{
text-align:center;
padding:15px;
background:#14142b;
font-size:22px;
font-weight:bold;
color:#8b5cf6;
}

/* CATEGORIES */
.cats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:15px;
}

.cats button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#2a2a50;
color:#fff;
cursor:pointer;
}

.cats button.active{
background:#8b5cf6;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:1fr;
gap:10px;
padding:15px;
}

/* BOX 4:1 */
.card{
background:#1c1c3a;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
padding:10px;
cursor:pointer;
height:90px;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.card h4{
margin:0;
font-size:14px;
flex:1;
}

.card p{
margin:0;
color:#8b5cf6;
font-weight:bold;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c3a;
padding:20px;
border-radius:12px;
width:280px;
text-align:center;
}

.box img{
width:100%;
border-radius:10px;
}

button{
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<header>Aldo Store</header>

<div class="cats">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('shoes',this)">Shoes</button>
<button onclick="filter('clothes',this)">Clothes</button>
<button onclick="filter('acc',this)">Acc</button>
<button onclick="filter('perfume',this)">Perfume</button>
</div>

<div class="products" id="products"></div>

<div class="popup" id="popup">
<div class="box">
<h3 id="name"></h3>
<p id="price"></p>
<img id="img">
<button onclick="closeP()">Close</button>
</div>
</div>

<script src="products.js"></script>

<script>

let current="all";

/* SHOW PRODUCTS */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

let filtered = products.filter(p=>current==="all"||p.cat===current);

filtered.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openP(${p.id})">
<img src="${p.media[0]}">
<div>
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
</div>
`;
});
}

/* FILTER */
function filter(c,btn){
current=c;
document.querySelectorAll(".cats button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

/* OPEN */
function openP(id){
let p = products.find(x=>x.id==id);

document.getElementById("popup").style.display="flex";
document.getElementById("name").innerText=p.name;
document.getElementById("price").innerText=p.price;
document.getElementById("img").src=p.media[0];
}

function closeP(){
document.getElementById("popup").style.display="none";
}

render();

</script>

</body>
</html>
